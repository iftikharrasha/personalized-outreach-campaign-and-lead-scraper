<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Outrich — Lead Scraper</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          primary:        '#9fe870',
          'primary-hover':'#cdffad',
          'primary-pale': '#e2f6d5',
          canvas:         '#ffffff',
          'canvas-soft':  '#e8ebe6',
          ink:            '#0e0f0c',
          body:           '#454745',
          mute:           '#868685',
          positive:       '#2ead4b',
          warning:        '#ffd11a',
          negative:       '#d03238',
          line:           '#e2e8e0',
          /* dark */
          'd-canvas':     '#1f221c',
          'd-canvas-soft':'#14150f',
          'd-ink':        '#f6f7f3',
          'd-body':       '#b8bab5',
          'd-mute':       '#868685',
          'd-line':       '#2a2c27',
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        borderRadius: { card: '24px' },
      },
    },
  };
</script>
<style>
  html, body { font-family: 'Inter', system-ui, sans-serif; }
  body { background:#e8ebe6; color:#0e0f0c; -webkit-font-smoothing: antialiased; }
  html.dark body { background:#14150f; color:#f6f7f3; }
  /* hide native number input arrows */
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  /* table row hover bg already via tw, but stronger on dark */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 999px; }
  html.dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
  /* selection */
  ::selection { background:#9fe870; color:#0e0f0c; }
  /* fade-in for toasts/modals */
  @keyframes fadein { from {opacity:0; transform: translateY(8px);} to {opacity:1; transform: translateY(0);} }
  @keyframes scalein { from {opacity:0; transform: scale(.96);} to {opacity:1; transform: scale(1);} }
  @keyframes pulsegreen { 0%,100%{opacity:1} 50%{opacity:.35} }
  .anim-fadein { animation: fadein .22s ease-out both; }
  .anim-scalein { animation: scalein .18s ease-out both; }
  .pulse-dot { animation: pulsegreen 1.4s ease-in-out infinite; }
  /* indeterminate scraping bar */
  @keyframes indeterm { 0% { transform: translateX(-100%);} 100% { transform: translateX(250%);} }
  .bar-indeterm { animation: indeterm 1.6s ease-in-out infinite; }

  /* "email just landed" row flash — fades from primary-pale to transparent */
  @keyframes flashfound {
    0%   { background-color: rgba(159, 232, 112, 0.45); }
    100% { background-color: rgba(159, 232, 112, 0); }
  }
  .flash-found { animation: flashfound 1.8s ease-out 1; }
  @keyframes popemail {
    0%   { opacity: 0; transform: translateY(-4px); }
    60%  { opacity: 1; transform: translateY(0); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .pop-email { animation: popemail .32s ease-out both; }
  /* soft pulse for the "searching this lead" inline state */
  @keyframes searchpulse {
    0%, 100% { opacity: .55; }
    50%      { opacity: 1; }
  }
  .pulse-search { animation: searchpulse 1.2s ease-in-out infinite; }

  /* focus rings */
  button:focus-visible, [role="button"]:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
    outline: 2px solid #9fe870; outline-offset: 2px; border-radius: 8px;
  }
</style>

<!-- React + Babel pinned -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body style="background-color: rgb(255, 255, 255); font-family: system-ui">
  <div id="root"></div>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" src="run-history.jsx"></script>
  <script type="text/babel" src="enrichment.jsx"></script>
  <script type="text/babel" src="yelp.jsx"></script>
  <script type="text/babel" src="inbox-data.jsx"></script>
  <script type="text/babel" src="inbox.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="screens-detail.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
